name: Daily Intelligence Engine

permissions:
  contents: write

on:
  schedule:
    # Every 15 minutes throughout the day = 96 runs/day
    # This gives ~96 potential commits, well distributed
    - cron: '0/15 * * * *'
  workflow_dispatch:

concurrency:
  group: daily-intelligence
  cancel-in-progress: false

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check daily limit (IST)
        id: limit_check
        run: |
          TODAY_IST=$(TZ=Asia/Kolkata date +"%Y-%m-%d")
          START_UTC=$(TZ=Asia/Kolkata date -d "$TODAY_IST 00:00:00" -u +"%Y-%m-%dT%H:%M:%SZ")
          END_UTC=$(TZ=Asia/Kolkata date -d "$TODAY_IST 23:59:59" -u +"%Y-%m-%dT%H:%M:%SZ")
          COUNT=$(git log --since="$START_UTC" --until="$END_UTC" --no-merges --pretty=%H | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY_IST" >> "$GITHUB_OUTPUT"
          echo "Commits so far today (git history): $COUNT"

      - name: Exit if daily target reached
        if: steps.limit_check.outputs.count >= 100
        run: |
          echo "✅ Daily target of 100 commits reached. Exiting."
          exit 0

      - name: Decide what to run this cycle
        id: task
        run: |
          # Based on current UTC minute, decide which task to run
          # This creates natural variety in what each commit does
          MINUTE=$(date -u +"%M" | sed 's/^0//')
          HOUR=$(date -u +"%H" | sed 's/^0//')
          
          # Every 6 hours, refresh all feeds (4 times a day)
          if [ "$MINUTE" -lt 15 ] && { [ "$HOUR" = "0" ] || [ "$HOUR" = "6" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "18" ]; }; then
            echo "task=full_refresh" >> "$GITHUB_OUTPUT"
          # Every hour at :15, refresh crypto only (prices change often)
          elif [ "$MINUTE" -ge 15 ] && [ "$MINUTE" -lt 30 ]; then
            echo "task=crypto" >> "$GITHUB_OUTPUT"
          # Every hour at :30, refresh hacker news
          elif [ "$MINUTE" -ge 30 ] && [ "$MINUTE" -lt 45 ]; then
            echo "task=news" >> "$GITHUB_OUTPUT"
          # Every hour at :45, just update health + dashboard
          else
            echo "task=heartbeat" >> "$GITHUB_OUTPUT"
          fi

      - name: Full Refresh (GitHub + Crypto + News)
        if: steps.task.outputs.task == 'full_refresh'
        run: |
          python scripts/fetch_github_trending.py
          python scripts/fetch_crypto_data.py
          python scripts/fetch_hacker_news.py

      - name: Crypto Only Refresh
        if: steps.task.outputs.task == 'crypto'
        run: python scripts/fetch_crypto_data.py

      - name: News Only Refresh
        if: steps.task.outputs.task == 'news'
        run: python scripts/fetch_hacker_news.py

      - name: Generate learning log entry
        run: python update_learning_log.py

      - name: Detect meaningful file changes
        id: detect_changes
        run: |
          git add data/github_trending.json data/hacker_news.json data/crypto.json data/learning_log.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No content changes found in tracked source files."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Meaningful source changes detected."
          fi

      - name: Refresh run health & dashboard (only when changed)
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          python scripts/update_run_health.py --pending-commit 1
          python scripts/generate_dashboard.py
          git add README.md data/run_health.json data/learning_log.md data/github_trending.json data/hacker_news.json data/crypto.json

      - name: Commit and push
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          set -e
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"

          TODAY_IST=$(TZ=Asia/Kolkata date +"%Y-%m-%d")
          NOW_IST=$(TZ=Asia/Kolkata date +"%Y-%m-%d %H:%M:%S IST")
          
          CHANGED_FILES=$(git diff --cached --name-only)
          TOPICS=()
          if echo "$CHANGED_FILES" | grep -q "^data/github_trending.json$"; then TOPICS+=("github"); fi
          if echo "$CHANGED_FILES" | grep -q "^data/hacker_news.json$"; then TOPICS+=("hacker-news"); fi
          if echo "$CHANGED_FILES" | grep -q "^data/crypto.json$"; then TOPICS+=("crypto"); fi
          if echo "$CHANGED_FILES" | grep -q "^README.md$"; then TOPICS+=("dashboard"); fi
          if echo "$CHANGED_FILES" | grep -q "^data/learning_log.md$"; then TOPICS+=("learning-log"); fi
          if [ ${#TOPICS[@]} -eq 0 ]; then
            TOPIC_LABEL="engine"
          else
            TOPIC_LABEL=$(IFS=', '; echo "${TOPICS[*]}")
          fi

          # Count existing committed entries today
          COUNT=0
          if [ -f data/auto-commits.log ]; then
            COUNT=$(grep -c "^$TODAY_IST |" data/auto-commits.log 2>/dev/null || true)
          fi
          NEXT=$((COUNT + 1))

          echo "$TODAY_IST | commit $NEXT | $NOW_IST | $TOPIC_LABEL" >> data/auto-commits.log
          git add data/auto-commits.log

          MSG="chore: refresh ${TOPIC_LABEL} signals [$TODAY_IST #$NEXT]"

          git commit -m "$MSG"
          git push
